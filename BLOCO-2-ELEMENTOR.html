<!-- ══════════════════════════════════════════════════════════════════
     CAMPANHA POR VÍDEO (?c=) → campo escondido "campaign" do formulário
     Ex.: studiovtx.com.br/lsf?c=yt-casa-lsf-01#projeto
     Lê o ?c= da URL e escreve no campo campaign do widget Form do
     Elementor. Sem ?c=, o campo fica vazio. Também propaga o código
     para os links de WhatsApp, para o lead do YouTube carregar a origem.
     NÃO contém chave nenhuma — é seguro rodar no navegador.
     ══════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  var c = (new URLSearchParams(location.search).get('c') || '').slice(0, 60);
  if (!c) return;

  function preencherCampanha() {
    // Elementor gera o hidden como id="form-field-campaign"
    var alvos = document.querySelectorAll(
      '#form-field-campaign, input[name="form_fields[campaign]"], input[name="campaign"], #campo-campanha'
    );
    alvos.forEach(function (el) { el.value = c; });
    return alvos.length > 0;
  }

  // tenta agora; se o form ainda nao existir, observa o DOM ate aparecer
  if (!preencherCampanha()) {
    var obs = new MutationObserver(function () {
      if (preencherCampanha()) obs.disconnect();
    });
    obs.observe(document.body, { childList: true, subtree: true });
    setTimeout(function () { obs.disconnect(); }, 10000);
  }

  // propaga a origem tambem para os botoes de WhatsApp
  document.querySelectorAll('a[href*="wa.me"]').forEach(function (a) {
    try {
      var u = new URL(a.href);
      var t = u.searchParams.get('text') || '';
      u.searchParams.set('text', t + ' (origem: ' + c + ')');
      a.href = u.toString();
    } catch (e) {}
  });
})();
</script>


<script>



  // ── DEPOIMENTOS ──────────────────────────────────────
  (function(){
    const track = document.getElementById('dep-track');
    const dotsEl = document.getElementById('dep-dots');
    if (!track) return;
    const slides = track.querySelectorAll('.dep-slide');
    const n = slides.length;
    let cur = 0;
    for (let i = 0; i < n; i++){
      const d = document.createElement('button');
      d.className = 'dep-dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', 'slide ' + (i+1));
      d.onclick = () => go(i);
      dotsEl.appendChild(d);
    }
    function go(idx){
      cur = (idx + n) % n;
      track.style.transform = 'translateX(-' + (cur * 100) + '%)';
      dotsEl.querySelectorAll('.dep-dot').forEach((d,i) => d.classList.toggle('active', i === cur));
    }
    document.getElementById('dep-prev').onclick = () => go(cur - 1);
    document.getElementById('dep-next').onclick = () => go(cur + 1);
    let sx = 0;
    track.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
    track.addEventListener('touchend',   e => { const dx = e.changedTouches[0].clientX - sx; if (Math.abs(dx) > 50) go(dx < 0 ? cur+1 : cur-1); }, {passive:true});
  })();
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(el => { if (el.isIntersecting) el.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  reveals.forEach(el => observer.observe(el));
</script>

// ── STATE ─────────────────────────────────────────────
let currentProject = null;
let currentIndex = 0;

// ── OPEN / CLOSE ──────────────────────────────────────
function openLightbox(projectId) {
  currentProject = projects[projectId];
  if (!currentProject) return;
  currentIndex = 0;
  document.getElementById('lb-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  renderLightbox();
}

function closeLightbox() {
  document.getElementById('lb-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ── RENDER ────────────────────────────────────────────
function renderLightbox() {
  const p = currentProject;
  const total = p.images.length;

  // Header
  document.getElementById('lb-name').innerHTML = 'casa<span>' + p.name + '</span>';
  document.getElementById('lb-counter').textContent = (currentIndex + 1) + ' / ' + total;

  // Info panel
  document.getElementById('lb-tag').textContent = p.tag;
  document.getElementById('lb-title').innerHTML = p.title;

  const body = document.getElementById('lb-info-body');
  body.innerHTML = '<div class="lb-info-row"><div class="lb-info-label">status</div><div class="lb-info-status ' + p.status + '">' + p.statusLabel + '</div></div>'
    + p.info.map(r => '<div class="lb-info-row"><div class="lb-info-label">' + r.label + '</div><div class="lb-info-value">' + r.value + '</div></div>').join('');

  // Thumbnails
  const thumbs = document.getElementById('lb-thumbs');
  thumbs.innerHTML = p.images.map((src, i) => {
    const active = i === currentIndex ? ' active' : '';
    return '<img class="lb-thumb' + active + '" src="' + src + '" alt="img ' + (i+1) + '" onclick="goTo(' + i + ')" onerror="this.style.display=\'none\'">';
  }).join('');

  // Main image
  loadImage(currentIndex);

  // Nav visibility
  document.getElementById('lb-prev').style.opacity = currentIndex === 0 ? '0.3' : '1';
  document.getElementById('lb-next').style.opacity = currentIndex === total - 1 ? '0.3' : '1';
}

function loadImage(index) {
  const img = document.getElementById('lb-main-img');
  const placeholder = document.getElementById('lb-placeholder');
  const src = currentProject.images[index];

  img.classList.add('fading');
  setTimeout(() => {
    img.src = src;
    img.onload = () => {
      img.style.display = 'block';
      placeholder.style.display = 'none';
      img.classList.remove('fading');
    };
    img.onerror = () => {
      img.style.display = 'none';
      placeholder.style.display = 'flex';
      img.classList.remove('fading');
    };
  }, 150);

  // Update counter
  document.getElementById('lb-counter').textContent = (index + 1) + ' / ' + currentProject.images.length;

  // Update thumbs
  document.querySelectorAll('.lb-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });
}

function goTo(index) {
  const total = currentProject.images.length;
  if (index < 0 || index >= total) return;
  currentIndex = index;
  loadImage(currentIndex);
  document.getElementById('lb-prev').style.opacity = currentIndex === 0 ? '0.3' : '1';
  document.getElementById('lb-next').style.opacity = currentIndex === total - 1 ? '0.3' : '1';
}

// ── EVENT LISTENERS ───────────────────────────────────
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => goTo(currentIndex - 1));
document.getElementById('lb-next').addEventListener('click', () => goTo(currentIndex + 1));

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb-overlay').classList.contains('active')) return;
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
  if (e.key === 'Escape') closeLightbox();
});

// ── SWIPE (MOBILE) ────────────────────────────────────
let touchStartX = 0;
document.getElementById('lb-overlay').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lb-overlay').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? goTo(currentIndex + 1) : goTo(currentIndex - 1);
}, { passive: true });

// ── HOOK PROJECT CARDS ────────────────────────────────
document.querySelectorAll('.project-card[data-project]').forEach(card => {
  card.style.cursor = 'pointer';
  card.addEventListener('click', () => openLightbox(card.dataset.project));
});
</script>
